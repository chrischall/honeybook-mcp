name: Cut & Bump

on:
  workflow_dispatch: {}

jobs:
  cut-and-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Read current version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Tag current version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.ver.outputs.version }}" -m "v${{ steps.ver.outputs.version }}"
      - name: Bump patch in all four files
        run: |
          npm version patch --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          node -e "const f=require('fs');const p='src/index.ts';const s=f.readFileSync(p,'utf8');f.writeFileSync(p,s.replace(/version:\s*'[^']+'/,\"version: '$NEW'\"))"
          node -e "const f=require('fs');const p='manifest.json';const m=JSON.parse(f.readFileSync(p,'utf8'));m.version='$NEW';f.writeFileSync(p,JSON.stringify(m,null,2)+'\n')"
          node -e "const f=require('fs');const p='server.json';const s=JSON.parse(f.readFileSync(p,'utf8'));s.version='$NEW';if(s.packages&&s.packages[0])s.packages[0].version='$NEW';f.writeFileSync(p,JSON.stringify(s,null,2)+'\n')"
      - name: Commit bump and push
        run: |
          git add package.json package-lock.json src/index.ts manifest.json server.json
          git commit -m "chore: bump to $(node -p "require('./package.json').version")"
          git push origin HEAD --tags
